version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: turnomedico-db
    environment:
      POSTGRES_USER: turnomedico
      POSTGRES_PASSWORD: turnomedico_dev
      POSTGRES_DB: turnomedico
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: turnomedico-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
